apiVersion: v1
kind: Service
metadata:
  name: {{ include "yk-update-checker.fullname" . }}
  labels:
    {{- include "yk-update-checker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "yk-update-checker.selectorLabels" . | nindent 4 }}
