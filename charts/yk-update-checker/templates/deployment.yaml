apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yk-update-checker.fullname" . }}
  labels:
    {{- include "yk-update-checker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "yk-update-checker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "yk-update-checker.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "yk-update-checker.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: update-checker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --port=8080
            - --config=/etc/update-checker/config.yaml
            - --cronjob={{ include "yk-update-checker.fullname" . }}-scanner
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/update-checker
              readOnly: true
          env:
            # Keep the Go heap under the container limit so the GC works harder
            # near the limit instead of the kernel OOMKilling the pod mid-scan.
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: update-checker
                  resource: limits.memory
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "yk-update-checker.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
