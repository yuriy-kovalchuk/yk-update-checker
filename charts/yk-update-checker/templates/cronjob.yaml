apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "yk-update-checker.fullname" . }}-scanner
  labels:
    {{- include "yk-update-checker.labels" . | nindent 4 }}
    app.kubernetes.io/component: scanner
spec:
  schedule: {{ .Values.scanner.schedule | quote }}
  suspend: {{ .Values.scanner.suspend }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "yk-update-checker.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: scanner
        spec:
          securityContext:
            {{- toYaml .Values.scanner.podSecurityContext | nindent 12 }}
          restartPolicy: Never
          serviceAccountName: {{ include "yk-update-checker.serviceAccountName" . }}
          containers:
            - name: scanner
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                - scan
                - --config=/etc/update-checker/config.yaml
                - --server-url=http://{{ include "yk-update-checker.fullname" . }}:{{ .Values.service.port }}
              volumeMounts:
                - name: config
                  mountPath: /etc/update-checker
                  readOnly: true
                - name: scanner-tmp
                  mountPath: /tmp
              env:
                - name: SCAN_TRIGGER
                  value: scheduled
                {{- with .Values.scanner.extraEnv }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              securityContext:
                {{- toYaml .Values.scanner.containerSecurityContext | nindent 16 }}
              resources:
                {{- toYaml .Values.scanner.resources | nindent 16 }}
          volumes:
            - name: config
              configMap:
                name: {{ include "yk-update-checker.fullname" . }}-config
            - name: scanner-tmp
              emptyDir: {}
