{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "yk-update-checker.fullname" . }}
  labels:
    {{- include "yk-update-checker.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "yk-update-checker.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "yk-update-checker.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
