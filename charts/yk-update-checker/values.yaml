# Default values for yk-update-checker.
# All three deployment modes (binary, Docker, Kubernetes) use the same image.

image:
  repository: ghcr.io/yuriy-kovalchuk/yk-update-checker
  tag: ""          # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# ── Dashboard (always-on serve mode) ─────────────────────────────────────────
replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: update-checker.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

# Security context for the serve Deployment. Overridden independently from scanner.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# Extra environment variables applied to the serve Deployment.
extraEnv: []
# - name: FOO
#   value: bar

# ── Scanner CronJob ───────────────────────────────────────────────────────────
scanner:
  # CronJob schedule (standard 5-field cron expression).
  schedule: "0 */6 * * *"
  # Suspend the CronJob without deleting it.
  suspend: false

  # Scanner config — serialised as config.yaml mounted into the CronJob pod.
  config:
    update_type: all          # all | major | minor | patch
    parallel_checks: 5
    git_cache_dir: /tmp/git-cache
    repos: []
    # - name: my-gitops
    #   repo: https://github.com/example/my-gitops-repo
    #   path: kubernetes/apps   # optional sub-path
    #   auth:
    #     type: token           # token | basic | ssh
    #     existingSecret: github-token
    #     existingSecretKey: token

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 1000m
      memory: 256Mi

  # Security context for the scanner CronJob — independent from deployment.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# ── RBAC (required for the manual scan trigger) ───────────────────────────────
rbac:
  # Creates a Role + RoleBinding allowing the serve pod to create Jobs.
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}
