name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ── Go: vet, lint, test ────────────────────────────────────────────────────
  go:
    name: Go lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Run tests
        run: go test -v -race -count=1 -coverprofile=coverage.txt ./...

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        with:
          files: coverage.txt
        continue-on-error: true

  # ── Go: build binary ───────────────────────────────────────────────────────
  build:
    name: Build binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

  # ── Docker: build image + Trivy image scan ────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: yk-update-checker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy image scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: yk-update-checker:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          limit-severities-for-sarif: true

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Helm: lint + template render ──────────────────────────────────────────
  helm:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart (strict)
        run: helm lint charts/yk-update-checker --strict

      - name: Template render (smoke test)
        run: helm template smoke charts/yk-update-checker

  # ── Security: Trivy filesystem scan ───────────────────────────────────────
  security:
    name: Trivy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          limit-severities-for-sarif: true

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
