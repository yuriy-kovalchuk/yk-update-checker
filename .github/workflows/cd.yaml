name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # create GitHub Releases and upload assets
  packages: write          # push images and charts to GHCR
  security-events: write   # upload Trivy SARIF results

env:
  REGISTRY:   ghcr.io
  IMAGE:      ghcr.io/${{ github.repository_owner }}/yk-update-checker
  CHART_NAME: yk-update-checker
  CHART_DIR:  charts/yk-update-checker

jobs:
  # ── Derive version once, share across jobs ─────────────────────────────────
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag:     ${{ steps.version.outputs.tag }}
      date:    ${{ steps.date.outputs.date }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Capture build date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

  # ── Build and push image ───────────────────────────────────────────────────
  build-image:
    name: Build & push image
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ needs.version.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security: Trivy image scan ────────────────────────────────────────────
  scan-image:
    name: Trivy image scan
    needs: [version, build-image]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy image scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}:${{ needs.version.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          limit-severities-for-sarif: true

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Package Helm chart and create GitHub Release ───────────────────────────
  release:
    name: Package chart & release
    needs: [version, build-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to Helm OCI registry (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Package Helm chart
        id: helm-package
        run: |
          helm package ${{ env.CHART_DIR }} \
            --version "${{ needs.version.outputs.version }}" \
            --app-version "${{ needs.version.outputs.version }}" \
            --destination .
          echo "tgz=${{ env.CHART_NAME }}-${{ needs.version.outputs.version }}.tgz" >> "$GITHUB_OUTPUT"

      - name: Push Helm chart to GHCR
        run: |
          helm push ${{ steps.helm-package.outputs.tgz }} \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.helm-package.outputs.tgz }}
          body: |
            ## Docker image

            ```bash
            docker pull ${{ env.IMAGE }}:${{ needs.version.outputs.version }}
            ```

            ## Helm chart

            ```bash
            helm install yk-update-checker \
              oci://ghcr.io/${{ github.repository_owner }}/charts/yk-update-checker \
              --version ${{ needs.version.outputs.version }} \
              -f values.yaml
            ```
